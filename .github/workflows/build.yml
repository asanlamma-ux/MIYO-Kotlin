name: MIYU Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lint --no-daemon --stacktrace

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ── Unit tests ────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ── External source packages ──────────────────────────
  source-packages:
    name: Build source packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install package tooling
        run: npm ci

      - name: Build source packages
        run: npm run build:source-packages

      - name: Upload source packages
        uses: actions/upload-artifact@v4
        with:
          name: MIYU-source-packages
          path: |
            source-plugins/.dist/*.miyuplugin.zip
            source-plugins/.dist/*.json
          retention-days: 30

  # ── Build release APK ─────────────────────────────────
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Also build on PR even if lint/test fail so we see build errors
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Export NDK path
        run: echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Verify NDK & CMake
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_SDK_ROOT/ndk/26.1.10909125 2>/dev/null || echo "NDK path via env"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "KEYSTORE_BASE64_SECRET_EMPTY=true" >> $GITHUB_ENV
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
            echo "No keystore secret set — skipping decode"
            exit 0
          fi
          KEYSTORE_FILE="${{ github.workspace }}/release.keystore"
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d 2>/dev/null > "$KEYSTORE_FILE" || \
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode 2>/dev/null > "$KEYSTORE_FILE" || \
          echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | openssl base64 -d -A 2>/dev/null > "$KEYSTORE_FILE" || \
          ( echo "ERROR: All decode methods failed"; exit 1 )
          if [ -s "$KEYSTORE_FILE" ] && file "$KEYSTORE_FILE" | grep -qiE "keystore|java|pkcs|data"; then
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
            echo "Keystore decoded and verified successfully"
          else
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
            echo "WARNING: Decode produced invalid or empty keystore"
            rm -f "$KEYSTORE_FILE"
          fi

      - name: Check keystore decoded
        if: env.KEYSTORE_EXISTS != 'true' && env.KEYSTORE_BASE64_SECRET_EMPTY != 'true'
        run: |
          KS="${{ github.workspace }}/release.keystore"
          if [ -f "$KS" ] && [ -s "$KS" ]; then
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Build release APK
        env:
          MIYU_KEYSTORE: ${{ env.KEYSTORE_EXISTS == 'true' && format('{0}/release.keystore', github.workspace) || '' }}
          MIYU_STORE_PASSWORD: ${{ secrets.MIYU_STORE_PASSWORD }}
          MIYU_KEY_ALIAS: ${{ secrets.MIYU_KEY_ALIAS }}
          MIYU_KEY_PASSWORD: ${{ secrets.MIYU_KEY_PASSWORD }}
        run: |
          echo "Building release APK with R8 code shrinking..."
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Dandroid.enableR8.fullMode=true

      - name: Check R8 warnings
        if: always()
        run: |
          echo "=== Checking for R8/ProGuard warnings ==="
          R8_LOG=app/build/outputs/mapping/release/usage.txt
          if [ -f "$R8_LOG" ]; then
            echo "R8 usage report exists: $R8_LOG"
            wc -l "$R8_LOG"
          fi

          SEEDS=app/build/outputs/mapping/release/seeds.txt
          if [ -f "$SEEDS" ]; then
            echo "R8 seeds report exists: $SEEDS"
            wc -l "$SEEDS"
          fi

          echo "=== Build outputs ==="
          ls -la app/build/outputs/mapping/release/ 2>/dev/null || echo "No mapping output directory"

      - name: Verify APK exists
        run: |
          APK=$(find app/build/outputs -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found!"
            find app/build/outputs -type f
            exit 1
          fi
          echo "APK=$APK"
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: MIYU-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload mapping file (crashlytics)
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

  # ── Release on tag ────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, source-packages]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: MIYU-release
          path: release/apk/

      - name: Download source package artifacts
        uses: actions/download-artifact@v4
        with:
          name: MIYU-source-packages
          path: release/source-packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/apk/*.apk
            release/source-packages/*.miyuplugin.zip
            release/source-packages/*.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
